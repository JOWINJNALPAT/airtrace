<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — AirTrace</title>
    <meta name="api-base-url" content="https://airtrace1.onrender.com">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-icon">✈</div>
                Air<span>Trace</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html">Find Luggage</a></li>
                <li><a href="passenger-report.html">Report Lost</a></li>
                <li class="nav-cta"><a href="admin-login.html" class="active">Admin Portal</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-logo">
                <div class="logo-mark">🛡️</div>
            </div>
            <h2 style="text-align: center;">Admin Management</h2>
            <p class="subtitle">Secure access for claims & logistics</p>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="admin1" onkeypress="if(event.key==='Enter') adminLogin()">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••"
                    onkeypress="if(event.key==='Enter') adminLogin()">
            </div>

            <button onclick="adminLogin()" class="btn btn-primary btn-full" style="margin-top: 10px; margin-bottom: 15px;">
                Enter Admin Console &rarr;
            </button>
            <button onclick="window.location.href='admin-register.html'" class="btn btn-secondary btn-full" style="margin-bottom: 10px;">
                Register Admin
            </button>

            <div id="loginError" class="error" style="display:none; margin-top:20px;"></div>
            <div id="loginSuccess" class="success" style="display:none; margin-top:20px;"></div>

            <div style="margin-top: 30px; text-align: center; font-size: 12px; color: var(--text-700);">
                AirTrace Security Standard v3.0
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
