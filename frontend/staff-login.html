<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AirTrace Staff Portal — Secure login for authorised airport personnel.">
    <title>Staff Login — AirTrace</title>
    <meta name="api-base-url" content="https://airtrace1.onrender.com">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-icon">✈</div>
                Air<span>Trace</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html">Find Luggage</a></li>
                <li class="nav-cta"><a href="staff-login.html" class="active">Staff Portal</a></li>
            </ul>
        </div>
    </nav>

    <!-- Back Button -->
    <div class="container page-top-bar">
        <a href="index.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            Back to Home
        </a>
    </div>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-logo">
                <div class="logo-mark" style="font-size:28px;">✈</div>
                <h2>Staff Access</h2>
                <p class="subtitle">Restricted to authorised airport personnel only.</p>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required
                    onkeypress="if(event.key==='Enter') staffLogin()">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required
                    onkeypress="if(event.key==='Enter') staffLogin()">
            </div>

            <button onclick="staffLogin()" class="btn btn-primary btn-full"
                style="margin-top:10px; margin-bottom: 20px;">
                Sign In &rarr;
            </button>

            <div class="quick-logins"
                style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom: 20px;">
                <button
                    onclick="document.getElementById('username').value='admin1'; document.getElementById('password').value='password123'; staffLogin();"
                    class="btn btn-secondary" style="font-size:12px; padding: 6px 12px;">Login as Admin</button>
                <button
                    onclick="document.getElementById('username').value='staff1'; document.getElementById('password').value='password123'; staffLogin();"
                    class="btn btn-secondary" style="font-size:12px; padding: 6px 12px;">Login as Staff</button>
            </div>

            <div id="loginError" class="error" style="display:none;"></div>
            <div id="loginSuccess" class="success" style="display:none;"></div>

            <p style="text-align:center; margin-top:28px; font-size:13px; color:var(--text-700);">
                Having trouble? Contact your system administrator.
            </p>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-logo">✈ AirTrace</div>
            <p>&copy; 2026 AirTrace. All rights reserved.</p>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="search.html">Find Luggage</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
