<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration — AirTrace</title>
    <meta name="api-base-url" content="https://airtrace1.onrender.com">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-icon">✈</div>
                Air<span>Trace</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html">Find Luggage</a></li>
                <li class="nav-cta"><a href="admin-login.html" class="active">Admin Portal</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-logo">
                <div class="logo-mark">🛡️</div>
            </div>
            <h2 style="text-align: center;">Admin Registration</h2>
            <p class="subtitle">Secure creation of Management accounts</p>

            <div class="form-group">
                <label for="regEmployeeId">Employee ID / Badge No</label>
                <input type="text" id="regEmployeeId" placeholder="EMP001" onkeypress="if(event.key==='Enter') registerStaff('Admin')">
            </div>

            <div class="form-group">
                <label for="regUsername">Desired Username</label>
                <input type="text" id="regUsername" placeholder="admin1" onkeypress="if(event.key==='Enter') registerStaff('Admin')">
            </div>

            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="••••••••" onkeypress="if(event.key==='Enter') registerStaff('Admin')">
            </div>

            <button onclick="registerStaff('Admin')" class="btn btn-primary btn-full" style="margin-top: 10px; margin-bottom: 15px;">
                Create Admin Account &rarr;
            </button>
            <button onclick="window.location.href='admin-login.html'" class="btn btn-secondary btn-full" style="margin-bottom: 10px;">
                Back to Login
            </button>

            <div id="registerError" class="error" style="display:none; margin-top:20px;"></div>
            <div id="registerSuccess" class="success" style="display:none; margin-top:20px;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
